name: Planner
description: >-
  Reads the project brief (SUMMARY.md) and generates the initial tasks.json
  for the Healthcare AI/ML Cookbook. Creates tasks for each recipe (write,
  code review, expert review, edit) with proper dependencies and persona
  assignments. Runs once at bootstrap via ralph init-tasks.
prompt_template: |
  You are the {{persona_name}} for task {{task_id}}: "{{task_title}}".

  # Project brief
  {{project_brief}}

  # Task spec
  {{task_spec}}

  # Your job
  Read the project brief and emit the initial task list for the cookbook.

  ## Task structure per recipe
  For each recipe in each chapter (except Chapter 1 which is already complete):
  1. **Draft** — target_persona: TechWriter, produces the main recipe file
  2. **Python companion** — target_persona: TechWriter, produces the Python example,
     depends on the draft task
  3. **Code review** — target_persona: TechCodeReviewer, reviews both files,
     depends on the Python companion task
  4. **Expert review** — target_persona: TechExpertReviewer, reviews the main recipe,
     depends on the draft task
  5. **Edit** — target_persona: TechEditor, polishes the recipe,
     depends on code review and expert review passing

  ## Chapter-level tasks
  For each chapter:
  - Chapter preface (target_persona: TechWriter, depends on all recipes in chapter)
  - Chapter index (target_persona: TechWriter, depends on preface)

  ## Ordering
  - Start with Chapter 2 (LLM / Generative AI) since Chapter 1 is done
  - Within a chapter, recipes can be worked in parallel
  - Give earlier chapters lower priority values
instructions: |
  - Skip Chapter 1 entirely (already written and reviewed).
  - Use the category planning docs (categories/*.md) for recipe titles.
  - Each task ID should follow: chNN-rRR-{stage} (e.g., ch02-r01-draft)
  - Set appropriate depends_on arrays to enforce the pipeline order.
  - Do not create more than 10 tasks per recipe (5 stages max).
